---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: windmill
spec:
  chart:
    spec:
      chart: windmill
      version: 4.0.38
      sourceRef:
        kind: HelmRepository
        name: windmill
        namespace: flux-system
  interval: 1h
  values:
    postgresql:
      enabled: false
    ingress:
      enabled: false
    httproute:
      enabled: true
      parentRefs:
        - name: envoy-internal
          namespace: networking
          sectionName: https
    windmill:
      appReplicas: 1
      baseDomain: windmill.omux.io
      baseProtocol: https
      databaseUrlSecretName: windmill-secret
      databaseUrlSecretKey: url
      app:
        annotations:
          secret.reloader.stakater.com/reload: windmill-secret
        initContainers:
          - name: init-db
            image: ghcr.io/kyteproject/postgres-init:17.7
            imagePullPolicy: IfNotPresent
            envFrom:
              - secretRef:
                  name: windmill-secret
          - name: init-windmill-roles
            image: public.ecr.aws/docker/library/postgres:17
            imagePullPolicy: IfNotPresent
            envFrom:
              - secretRef:
                  name: windmill-secret
            env:
              - name: PGHOST
                value: postgres-rw.database.svc.cluster.local
              - name: PGUSER
                value: postgres
              - name: PGPASSWORD
                valueFrom:
                  secretKeyRef:
                    name: windmill-secret
                    key: INIT_POSTGRES_SUPER_PASS
            command:
              - /bin/sh
              - -ec
              - |
                export INIT_POSTGRES_SUPER_USER="${INIT_POSTGRES_SUPER_USER:-postgres}"
                export INIT_POSTGRES_PORT="${INIT_POSTGRES_PORT:-5432}"
                export PGHOST="${INIT_POSTGRES_HOST}"
                export PGUSER="${INIT_POSTGRES_SUPER_USER}"
                export PGPASSWORD="${INIT_POSTGRES_SUPER_PASS}"
                export PGPORT="${INIT_POSTGRES_PORT}"

                until pg_isready >/dev/null 2>&1; do
                  sleep 1
                done

                for dbname in ${INIT_POSTGRES_DBNAME}; do
                  psql --dbname "${dbname}" -v app_user="${INIT_POSTGRES_USER}" -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'windmill_user') THEN CREATE ROLE windmill_user; END IF; END \$\$; DO \$\$ BEGIN IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'windmill_admin') THEN CREATE ROLE windmill_admin WITH BYPASSRLS; END IF; END \$\$; GRANT ALL ON ALL TABLES IN SCHEMA public TO windmill_user; GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO windmill_user; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO windmill_user; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO windmill_user; GRANT windmill_user TO windmill_admin; GRANT windmill_admin TO :\"app_user\"; GRANT windmill_user TO :\"app_user\"; GRANT USAGE ON SCHEMA public TO windmill_admin; GRANT USAGE ON SCHEMA public TO windmill_user;"
                done
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            memory: 1Gi
