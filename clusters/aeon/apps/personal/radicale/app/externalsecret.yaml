---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: radicale
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: radicale-secret
    template:
      data:
        users: "{{ .RADICALE_USERS }}"
  dataFrom:
    - extract:
        key: radicale
