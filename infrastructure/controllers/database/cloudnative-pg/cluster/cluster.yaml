---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  annotations:
    cnpg.io/skipEmptyWalArchiveCheck: enabled
spec:
  affinity:
    podAntiAffinityType: required
  bootstrap:
    recovery:
      source: &src source
      recoveryTarget:
        targetTLI: "1"
  externalClusters:
    - name: *src
      plugin:
        name: &plugin barman-cloud.cloudnative-pg.io
        isWALArchiver: true
        parameters:
          barmanObjectName: &store cloudflare-r2
          serverName: postgres
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3-standard-trixie@sha256:e4f9958296aac318d23c12e5f97369b47a925ee6f26eef4e2064affceb2ddf36
  instances: 3
  postgresql:
    extensions:
      - dynamic_library_path:
          - /usr/lib/postgresql/18/lib
        extension_control_path:
          - /usr/share/postgresql/18/
        name: vchord
        image:
          reference: ghcr.io/tensorchord/vchord-scratch:pg18-v0.5.3@sha256:c310ede47f7f82bd257c3e53806d60680d5899c318ca946fb313efad9a90a78e
    parameters:
      max_locks_per_transaction: "128"
      max_connections: "200"
      shared_buffers: 256MB
    shared_preload_libraries:
      - vchord.so
    synchronous:
      dataDurability: preferred
      method: any
      number: 1
  plugins:
    - name: *plugin
      isWALArchiver: true
      parameters:
        barmanObjectName: *store
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "4Gi"
  storage:
    resizeInUseVolumes: true
    size: 20Gi
    storageClass: openebs-hostpath
  enableSuperuserAccess: true
  superuserSecret:
    name: cloudnative-pg-secret
  monitoring:
    enablePodMonitor: true
